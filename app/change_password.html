<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Update Password | CDX CRM</title>
        <script>
            (() => {
                const systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
                document.documentElement.dataset.theme = systemDark ? "dark" : "light";
            })();
        </script>
        <link rel="icon" type="image/png" href="/logo.png" />
        <link rel="stylesheet" href="/styles.css" />
    </head>
    <body class="auth-page">
        <main class="auth-shell">
            <section class="auth-card">
                <img class="auth-logo" src="/logo.png" alt="CDX CRM logo" />
                <h1>Update password</h1>
                <p class="auth-copy">An administrator reset the password for __DISPLAY_NAME__. Set a new password to continue into CDX CRM.</p>
                __CHANGE_PASSWORD_ERROR__
                <form class="auth-form" method="post" action="/change-password">
                    <label>
                        <span>New password</span>
                        <input
                            name="new_password"
                            type="password"
                            autocomplete="new-password"
                            required
                        />
                    </label>
                    <label>
                        <span>Confirm new password</span>
                        <input
                            name="confirm_password"
                            type="password"
                            autocomplete="new-password"
                            required
                        />
                    </label>
                    <button type="submit">Save new password</button>
                </form>
                <p class="auth-note">
                    This step is required before you can use the application again.
                </p>
            </section>
        </main>
    </body>
</html>
